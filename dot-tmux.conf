set -g default-terminal "tmux-256color"
set -gu terminal-features
set -g terminal-features "*:RGB:overline"

# Statusline + pane borders (powerline pills). Colours come from
# tmux-apply-colors.sh, which sources colors.sh ($PRIMARY etc, live
# off the Caelestia scheme) and pushes already-resolved hex via
# set-option — tmux's own #(...) validates status-style/
# pane-border-style eagerly at set-time and rejects a shell-command
# placeholder outright ("invalid style"), so this runs outside tmux
# instead. Re-run it (or `tmux source-file ~/.tmux.conf`) any time to
# re-sync after a scheme switch.
set -g status-left-length 40
run-shell "~/.config/programs/shell_scripts/tmux-apply-colors.sh"

set -g focus-events on

# Vim motions
setw -g mode-keys vi

# Vim-style copy mode selection/yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind M-h move-pane -h -t .left \; select-layout -E
bind M-j move-pane -v -t .bottom \; select-layout -E
bind M-k move-pane -v -t .top \; select-layout -E
bind M-l move-pane -h -t .right \; select-layout -E

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind = join-pane -v -s '{right-of}' \; select-layout -E
bind + join-pane -h -s '{down-of}'  \; select-layout -E

# Popups delegate to standalone scripts (tmux-popup-*.sh) that read
# colours live from the Caelestia scheme via caelestia-color.sh on every
# launch. tmux's own #(...) substitution is documented as async and
# resolves empty on a first/one-shot use, so the border colour has to be
# computed with plain synchronous bash in those scripts, not inline here.
bind c run-shell -b "~/.config/programs/shell_scripts/tmux-popup-newwin.sh"
bind g run-shell -b "~/.config/programs/shell_scripts/tmux-popup-lazygit.sh '#{pane_current_path}'"
bind f run-shell -b "~/.config/programs/shell_scripts/tmux-popup-switcher.sh '#{pane_current_path}'"

