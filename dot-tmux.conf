set -g default-terminal "tmux-256color"
set -gu terminal-features
set -g terminal-features "*:RGB:overline"

# Statusline (powerline pills, colours from the hu-tao scheme)
set -g status-style "fg=#e5e1e7,bg=terminal,overline"
set -g status-left-length 40

set -g status-left "#[fg=#3a0000,bg=#EB6C6C,bold] п’ү #S #[fg=#EB6C6C,bg=terminal,nobold]оӮҙ"

set-window-option -g window-status-format "#[fg=#918f9a,bg=terminal] #I оӮ» #W "
set-window-option -g window-status-current-format "#[fg=#EB826C,bg=terminal] оӮ¶#[fg=#3a0000,bg=#EB826C,bold] #I оӮ» #W #[fg=#EB826C,bg=terminal,nobold]оӮҙ "

set -g status-right "#[fg=#EB6C6C,bg=terminal]оӮ¶#[fg=#3a0000,bg=#EB6C6C] пҖ— %H:%M оӮ» %d вҖў %b вҖў %y "

set -g focus-events on
set -g mouse on

# Pane borders
set -g pane-border-lines heavy
set -g pane-border-style "fg=#8a5560"
set -g pane-active-border-style "fg=#EB6C6C"

# Vim motions
setw -g mode-keys vi

# Vim-style copy mode selection/yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind M-h move-pane -h -t .left \; select-layout -E
bind M-j move-pane -v -t .bottom \; select-layout -E
bind M-k move-pane -v -t .top \; select-layout -E
bind M-l move-pane -h -t .right \; select-layout -E

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind = join-pane -v -s '{right-of}' \; select-layout -E
bind + join-pane -h -s '{down-of}'  \; select-layout -E

# Popups delegate to standalone scripts (tmux-popup-*.sh) that read
# colours live from the Caelestia scheme via caelestia-color.sh on every
# launch. tmux's own #(...) substitution is documented as async and
# resolves empty on a first/one-shot use, so the border colour has to be
# computed with plain synchronous bash in those scripts, not inline here.
bind c run-shell -b "~/.config/programs/shell_scripts/tmux-popup-newwin.sh"
bind g run-shell -b "~/.config/programs/shell_scripts/tmux-popup-lazygit.sh '#{pane_current_path}'"
bind f run-shell -b "~/.config/programs/shell_scripts/tmux-popup-switcher.sh '#{pane_current_path}'"

