bind C-M-l run "p=\$(tmux display -t \"\$TMUX_PANE\" -p '#{pane_current_path}'); \
              tmux split-window -h -c \"\$p\"; \
              tmux split-window -v -c \"\$p\"; \
              tmux split-window -h -c \"\$p\"; \
              tmux resize-pane -D 15; \
              tmux select-pane -R; \
              tmux resize-pane -L 40"

# Plugins (managed by TPM)
# Install/update with: prefix + I   (uninstall removed plugins with prefix + alt-u)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Persist sessions to disk: layouts, window names, pane working dirs.
# prefix + Ctrl-s = save   |   prefix + Ctrl-r = restore
set -g @resurrect-capture-pane-contents 'on'

# Auto-save every 15 min and auto-restore on tmux server start.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Keep this line LAST.
run '~/.tmux/plugins/tpm/tpm'
