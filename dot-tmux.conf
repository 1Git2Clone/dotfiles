set -g default-terminal "tmux-256color"

set -g status-bg "color1"

# Vim motions
setw -g mode-keys vi

# Vim-style copy mode selection/yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move/Shove a pane out of its current column into a completely different row
bind C-h move-pane -h -t .left \; select-layout -E
bind C-j move-pane -v -t .bottom \; select-layout -E
bind C-k move-pane -v -t .top \; select-layout -E
bind C-l move-pane -h -t .right \; select-layout -E

bind = join-pane -v -s '{right-of}' \; select-layout -E
bind + join-pane -h -s '{down-of}'  \; select-layout -E
