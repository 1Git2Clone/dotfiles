set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

set -g status-bg "color1"
set -g mouse on
set -g pane-border-style fg=color1
set -g pane-active-border-style fg=color88

# Vim motions
setw -g mode-keys vi

# Vim-style copy mode selection/yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move/Shove a pane out of its current column into a completely different row
# Unbind old keys first so stale mappings from a prior source-file don't
# shadow the new ones. Resourcing this file with `tmux source-file ~/.tmux.conf`
# picks up the changes live without restarting the server.
unbind C-h
unbind C-j
unbind C-k
unbind C-l
unbind M-l
bind M-h move-pane -h -t .left \; select-layout -E
bind M-j move-pane -v -t .bottom \; select-layout -E
bind M-k move-pane -v -t .top \; select-layout -E
bind M-l move-pane -h -t .right \; select-layout -E

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind = join-pane -v -s '{right-of}' \; select-layout -E
bind + join-pane -h -s '{down-of}'  \; select-layout -E

bind c display-popup -E -w 60% -h 50% -S "fg=#da5876" "
  { echo \"\$HOME\"; zoxide query -l; } \
  | fzf \
    --color 'fg:#ff5077,bg:#0a0000,pointer:#ffaa88,hl:#ffaa88,hl+:#ffaa88,header:#ffb3c3,prompt:#ff5077,info:#da5876' \
    --prompt '  dir: ' \
    --header ' New Window ' \
  | xargs -r ~/.config/programs/shell_scripts/tmux-new-named-window.sh
"
bind g display-popup -E -w 90% -h 90% -S "fg=#da5876" -d "#{pane_current_path}" "lazygit"
bind f display-popup -E -w 90% -h 80% -S "fg=#da5876" -d "#{pane_current_path}" "
  tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name} #{pane_current_path}' \
  | fzf --ansi \
    --preview 'tmux capture-pane -ep -t {1} | head -100' \
    --preview-window 'right:60%,border-rounded' \
    --color 'fg:#ff5077,bg:#0a0000,preview-bg:#110000,border:#da5876,pointer:#ffaa88,hl:#ffaa88,hl+:#ffaa88,header:#ffb3c3,prompt:#ff5077,info:#da5876' \
    --border 'rounded' \
    --prompt '🔍 Switch to: ' \
    --header ' Sessions / Windows ' \
    --delimiter ' ' \
  | cut -d' ' -f1 \
  | xargs tmux switch-client -t
"

