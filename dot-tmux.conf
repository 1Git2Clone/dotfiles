set -g default-terminal "tmux-256color"

set -g status-bg "color1"
set -g mouse on
set -g pane-border-style fg=color1
set -g pane-active-border-style fg=color88

# Vim motions
setw -g mode-keys vi

# Vim-style copy mode selection/yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move/Shove a pane out of its current column into a completely different row
bind C-h move-pane -h -t .left \; select-layout -E
bind C-j move-pane -v -t .bottom \; select-layout -E
bind C-k move-pane -v -t .top \; select-layout -E
bind C-l move-pane -h -t .right \; select-layout -E

bind = join-pane -v -s '{right-of}' \; select-layout -E
bind + join-pane -h -s '{down-of}'  \; select-layout -E

bind c display-popup -E "zoxide query -i | xargs tmux new-window -c"
bind f display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name} #{pane_current_path}' | fzf | cut -d' ' -f1 | xargs tmux switch-client -t"

# ── Plugins (managed by TPM) ───────────────────────────────────────────────
# Install/update with: prefix + I   (uninstall removed plugins with prefix + alt-u)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Persist sessions to disk: layouts, window names, pane working dirs.
# prefix + Ctrl-s = save   |   prefix + Ctrl-r = restore
set -g @resurrect-capture-pane-contents 'on'

# Auto-save every 15 min and auto-restore on tmux server start.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Keep this line LAST.
run '~/.tmux/plugins/tpm/tpm'
