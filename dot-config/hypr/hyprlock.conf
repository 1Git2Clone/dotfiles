# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    font_family = JetBrains Mono Nerd Font 10
    halign = center
    monitor =
}

background {
	  path = $HOME/dotfiles/dot-config/hypr/backgrounds/Hu_Tao_00008.png

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_size = 5
    blur_passes = 1
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

input-field {
    size = 240, 48
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $color5
    inner_color = $color0
    font_color = $color12
    fade_on_empty = false
    placeholder_text = <i>パスワード。。。</i> # 日本語
    # placeholder_text = <i>Password</i>
    hide_input = false

    position = 0, 200
    valign = bottom
}

# Time
label {
    text = cmd[update:1000] echo "<b><big> $(date +"%I時%M分%S秒") </big></b>" # 日本語
    # text = cmd[update:1000] echo "<b><big> $(date +"%I%M%S %p") </big></b>" # AM/PM
    # text = cmd[update:1000] echo "<b><big> $(date +"%H%M%S") </big></b>" # 24H
    color = $color15
    font_size = 64

    position = 0, -160
    valign = top
}

# Date
label {
    text = cmd[update:18000000] echo "<b> "$(date +'%Y年%m月%d日')" </b>" # 日本語
    # text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B %Y')" </b>"
    color = $color12
    font_size = 28

    position = 0, -284
    valign = top
}

# User
label {
    text =    $USER
    color = $color12
    font_size = 18
    font_family = Inter Display Medium

    position = 0, 98
    valign = bottom
}
