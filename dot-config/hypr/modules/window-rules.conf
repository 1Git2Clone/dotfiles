####################
### WINDOW RULES ###
####################

# https://wiki.hypr.land/Configuring/Window-Rules/

windowrulev2 = float, tag:centerfloat
windowrulev2 = center, tag:centerfloat
windowrulev2 = size 60% 60%, tag:centerfloat

windowrulev2 = tag +centerfloat, class:^(thunar|org\.gnome\.Nautilus)$
windowrulev2 = tag +centerfloat, class:^(floorp)$, title:^[Ss]ave.+
windowrulev2 = tag +centerfloat, class:^(xdg-desktop-portal-gtk)$, title:^blob:https://discord\.com/.+
windowrulev2 = tag +centerfloat, class:^(xdg-desktop-portal-gtk)$, title:Open Files

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

windowrule = float,class:^([Vv]esktop)$
windowrule = center,class:^([Vv]esktop)$
windowrule = size 80% 80%,class:^([Vv]esktop)$
windowrule = opacity 0.9,class:^([Vv]esktop)

windowrule = float,class:^(floating-term)$
windowrule = center,class:^(floating-term)$
windowrule = size 70% 70%,class:^(floating-term)$
windowrule = opacity 0.9,class:^(floating-term)
