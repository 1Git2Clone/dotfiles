# Pre-push hooks (push-time gate).
#
# This runs only on `git push`. Wider net than pre-commit — language
# linters, formatters, structural checks. Use for things that take
# >500ms or require language toolchains.
#
# Install:   pre-commit install --hook-type pre-push
# Run:       pre-commit run --hook-stage manual --all-files
#             (manual stage == all of pre-push)
#
# Layered with CI: the same checks run there on PRs. Keep them in
# sync — drift between local and CI linting is a debugging tax.

repos:
  # ── File hygiene ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$|\.markdown$|\.mdx$'
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^dot-config/opencode/skills/
      - id: check-json
        exclude: |
          (?x)^(
            dot-config/opencode/skills/.*\.json
            | dot-config/obs_plugins/.*\.json
            | _spicetify_theme_configs/.*\.json
            | dot-claude/\.mcp\.json
          )$
      - id: check-toml
      - id: check-case-conflict

  # ── Shell (shfmt + shellcheck) ────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.9.0-1
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci", "-sr", "-w"]

  # ── Python (ruff: lint + format) ──────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ── Lua (stylua — used by hyprland and nvim) ──────────────
  - repo: https://github.com/JohnnyMorganz/stylua
    rev: v2.0.2
    hooks:
      - id: stylua
        # No args: dot-config/hypr/stylua.toml is the source of truth.

  # ── Prettier (markdown, json, jsonc, yaml, css, html) ─────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@3.3.3
        exclude: |
          (?x)^(
            dot-config/opencode/skills/.*
            | dot-config/obs_plugins/.*\.json
            | _spicetify_theme_configs/.*\.json
            | package-lock\.json
            | .*\bnode_modules/.*
            | .*\bdist/.*
            | .*\.ttf
            | .*\.png
            | .*\.jpg
            | .*\.mp4
            | .*\.qbtheme
          )$

  # ── Markdown lint (repo-owned only, see .markdownlint-cli2.yaml) ──
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2

  # ── hadolint for any Dockerfiles we add later ─────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.0-beta
    hooks:
      - id: hadolint-docker
