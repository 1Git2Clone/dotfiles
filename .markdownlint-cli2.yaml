# markdownlint-cli2 configuration for the dotfiles repo.
#
# LAYER MODEL — configs and globs are split by file ownership:
#
#   1. Repo-owned markdown  ← linted with .markdownlint.yaml (strict).
#   2. Vendored markdown    ← linted with .markdownlint.vendored.yaml
#                             (advisory; excluded from CI by default).
#
# The globs below cover (1). Anything under `dot-config/opencode/`
# other than the project AGENTS.md falls into (2) — that path is
# excluded by the `dot-config/opencode/**` glob but the explicit
# AGENTS.md entry re-includes the one project-owned file in that
# tree. If you author new repo-owned markdown, add its path below.
#
# Globs are referenced verbatim by `.github/workflows/ci.yml` — keep
# them in sync or CI drifts from local linting.
config:
  - .markdownlint.yaml
globs:
  # Project-level, repo-owned. Linted with .markdownlint.yaml.
  - "README.md"
  - "LICENSE"

  # dot-claude/ — Claude Code integration (project-owned).
  - "dot-claude/CLAUDE.md"
  - "dot-claude/hooks/**/*.md"

  # dot-config/opencode/ — vendored EXCEPT for the project AGENTS.md.
  # The explicit entry below overrides the broader `dot-config/opencode/**`
  # exclude (added below) for this one project-owned file.
  - "dot-config/opencode/AGENTS.md"

  # dot-hermes/ — Hermes Agent integration (project-owned).
  - "dot-hermes/**/*.md"

  # dot-cargo/ — vendored Rust crate registry sources. Add overrides
  # here if you ever author project-owned markdown under dot-cargo/.
  # (No entries today.)

  # dot-local/, dot-profile.d/, dot-bashrc, dot-zshrc — sourced shell,
  # rarely have project-owned markdown.

# ── Exclude (vendored) ─────────────────────────────────────────────────────
# Anything matching these patterns is vendored upstream. It is excluded
# from CI and consumes .markdownlint.vendored.yaml if you lint it locally.
ignores:
  - "dot-config/opencode/skills/**"
  - "dot-config/opencode/agents/**"
  - "dot-config/opencode/commands/**"
  - "dot-config/opencode/plugins/**"
  - "dot-config/opencode/templates/**"
  - "dot-config/opencode/docs/**"
  - "dot-cargo/registry/**"
  - "dot-config/obs_plugins/**"
  - "_spicetify_theme_configs/**"
