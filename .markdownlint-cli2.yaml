# markdownlint-cli2 configuration for the dotfiles repo.
#
# LAYER: This lints markdown files that THIS REPO OWNS. It does not
# lint the ~500 markdown files under `dot-config/opencode/skills/`,
# `dot-config/opencode/agents/`, `dot-config/opencode/commands/`,
# etc. — those are vendored upstream content. If you author new
# markdown here, add the path to globs below.
#
# The pre-push hook and the CI workflow both use this config.
# Keep them in sync — drift between local and CI linting is a
# debugging tax.
#
# What counts as "repo-owned" markdown:
#   - README.md at the repo root
#   - dot-claude/CLAUDE.md, dot-claude/hooks/*.md, etc.
#   - dot-config/opencode/AGENTS.md (project-level prompt, not vendored)
#   - dot-hermes/config.example.yaml and any siblings

config: .markdownlint.yaml
globs:
  - "README.md"
  - "dot-claude/**/*.md"
  - "dot-config/opencode/AGENTS.md"
  - "dot-hermes/**/*.md"
