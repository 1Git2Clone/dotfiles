# ── Virtual Memory ────────────────────────────────────────────────────────────
# Low swappiness: prefer keeping processes in RAM, let ZRAM handle overflow
vm.swappiness = 15

# ZRAM-friendly: no read-ahead for swap (already compressed)
vm.page-cluster = 0

# More aggressive page writeback for responsive desktop
vm.dirty_ratio = 10
vm.dirty_background_ratio = 3
vm.dirty_writeback_centisecs = 500
vm.dirty_expire_centisecs = 3000

# ── Kernel ───────────────────────────────────────────────────────────────────
# Higher file descriptor limits for Electron apps, browsers, etc.
fs.file-max = 2097152
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024

# ── Network ──────────────────────────────────────────────────────────────────
# Higher connection backlog
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 65536

# TCP performance
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_sack = 1
net.ipv4.tcp_no_metrics_save = 1

# ── Misc ─────────────────────────────────────────────────────────────────────
# Magic SysRq for emergency recovery (Alt+SysRq+R/E/I/S/U/B)
kernel.sysrq = 1

# ── Tailscale ────────────────────────────────────────────────────────────────
net.ipv4.ip_forward=1
net.ipv6.conf.all.forwarding=1
