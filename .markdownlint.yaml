# markdownlint ruleset for the dotfiles repo's own markdown.
#
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
#
# The CI markdownlint job only lints a small, hand-curated set of
# project-owned files (see the globs in .github/workflows/ci.yml).
# So we can keep most rules enabled — the corpus is small enough
# to fix findings as they come up.
#
# Disabled rules (with reason):
#   MD013  line-length           — long lines exist in tables and
#                                   skill-prompt examples.
#   MD033  no-inline-html        — README uses callout blocks (><).
#   MD036  no-emphasis-as-heading — common in prompt content.
#   MD041  first-line-h1         — files are titled by filename.
default: true
MD013: false
MD033: false
MD036: false
MD041: false
